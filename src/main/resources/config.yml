# RealisticBodyHealth addon config
#
# This addon turns BodyHealth into the source of truth for survival:
# - HEAD/TORSO death is left to BodyHealth itself
# - broken limbs start bleeding
# - bleeding can damage the torso over time
# - vanilla hearts are kept as a synced shell and should not decide death

# Master switch for RealisticBodyHealth.
strict-mode: true

# How often to resync vanilla health and absorption.
health-sync-interval-ticks: 1

# Remove absorption hearts while RealisticBodyHealth is active.
clear-absorption: true

# Respect BodyHealth bypass permissions. If true, players with bypass
# permissions fall back to vanilla HP and are ignored by this addon.
respect-bodyhealth-bypass: true

# Automatically force BodyHealth's heal-on-full-health setting off and reload it.
auto-disable-bodyhealth-heal-on-full-health: true

bleeding:
  enabled: true
  interval-ticks: 40
  can-kill: true
  fatal-time-seconds-single-stack: 40.0
  extra-speed-per-stack: 1.0
  non-lethal-min-torso-health-percent: 1.0
  particle-count-base: 8
  particle-count-per-stack: 4
  sound: entity.player.hurt
  sound-volume: 0.9
  sound-pitch-base: 0.8
  actionbar: "&cYou are bleeding out"
